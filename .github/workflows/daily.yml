name: Daily Update

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 오전 9시 KST (= 자정 UTC)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic yt-dlp youtube-transcript-api

      - name: Run daily update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > /tmp/yt-cookies.txt
          python src/daily_run_ci.py

      - name: Commit and push changes
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add index.html data/summaries.json data/channel_videos.json
          git diff --staged --quiet || git commit -m "auto update $(date +'%Y-%m-%d')"
          git pull --rebase
          git push
